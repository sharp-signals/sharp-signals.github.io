<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <defs>
    <radialGradient id="coin" cx="42%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#fbe9a8"/>
      <stop offset="38%" stop-color="#e8c468"/>
      <stop offset="72%" stop-color="#c8992f"/>
      <stop offset="100%" stop-color="#8a6516"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbe9a8"/><stop offset="1" stop-color="#c8992f"/>
    </linearGradient>
    <radialGradient id="inner" cx="50%" cy="42%" r="62%">
      <stop offset="0%" stop-color="#16284a"/><stop offset="100%" stop-color="#0a1730"/>
    </radialGradient>
    <path id="top" d="M 120 120 m -86 0 a 86 86 0 1 1 172 0" fill="none"/>
    <path id="bot" d="M 120 120 m 86 0 a 86 86 0 1 1 -172 0" fill="none"/>
  </defs>

  <!-- corpo da moeda -->
  <circle cx="120" cy="120" r="116" fill="url(#coin)"/>
  <circle cx="120" cy="120" r="116" fill="none" stroke="#6e5012" stroke-width="3"/>
  <circle cx="120" cy="120" r="108" fill="none" stroke="#8a6516" stroke-width="1.5" opacity=".6"/>

  <!-- banda navy com o texto -->
  <circle cx="120" cy="120" r="98" fill="url(#inner)"/>
  <circle cx="120" cy="120" r="98" fill="none" stroke="url(#gold)" stroke-width="2.5"/>
  <circle cx="120" cy="120" r="74" fill="none" stroke="url(#gold)" stroke-width="2"/>

  <text font-family="Georgia,'Times New Roman',serif" font-weight="700" fill="url(#gold)"
        font-size="20" letter-spacing="3" text-anchor="middle">
    <textPath href="#top" startOffset="50%">MATCH&#160;VALUE</textPath>
  </text>
  <text font-family="Georgia,'Times New Roman',serif" font-weight="700" fill="url(#gold)"
        font-size="20" letter-spacing="6" text-anchor="middle">
    <textPath href="#bot" startOffset="50%">ELITE</textPath>
  </text>

  <!-- estrelas laterais -->
  <g fill="url(#gold)">
    <path d="M34 120 l5 -5 l5 5 l-5 5 z"/>
    <path d="M206 120 l-5 -5 l-5 5 l5 5 z"/>
  </g>

  <!-- disco central + monograma MW -->
  <circle cx="120" cy="116" r="56" fill="url(#coin)"/>
  <circle cx="120" cy="116" r="56" fill="none" stroke="#6e5012" stroke-width="2"/>
  <circle cx="120" cy="116" r="48" fill="url(#inner)"/>
  <circle cx="120" cy="116" r="48" fill="none" stroke="url(#gold)" stroke-width="2"/>
  <text x="120" y="135" text-anchor="middle" font-family="Georgia,'Times New Roman',serif"
        font-weight="800" font-size="52" fill="url(#gold)" letter-spacing="-4">MW</text>

  <!-- ramos de louro -->
  <g stroke="url(#gold)" stroke-width="2.5" fill="none" opacity=".9">
    <path d="M150 196 q26 -6 40 -28"/>
    <path d="M90 196 q-26 -6 -40 -28"/>
  </g>
  <g fill="url(#gold)" opacity=".9">
    <path d="M168 178 q6 -6 2 -12 q-7 3 -2 12"/>
    <path d="M178 168 q6 -6 2 -12 q-7 3 -2 12"/>
    <path d="M72 178 q-6 -6 -2 -12 q7 3 2 12"/>
    <path d="M62 168 q-6 -6 -2 -12 q7 3 2 12"/>
  </g>
</svg>
